[graph]
targets = ["x86_64-unknown-linux-gnu"]
all-features = true

[advisories]
unmaintained = "workspace"
yanked = "deny"

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # webpki-roots: Mozilla root certificate data
    "CDLA-Permissive-2.0",
    # rawler / rawloader: raw decode backend, statically linked into the
    # distributed binary (see NOTICE, docs/DECISIONS.md).
    "LGPL-2.1",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
