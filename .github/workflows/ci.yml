name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Every job here only checks out and builds/lints/tests; none of them push,
# release, or otherwise mutate repo state, so contents: read is sufficient.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          rustflags: ""
      - uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df # v2.70.3
        with:
          tool: just
      - uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df # v2.70.3
        with:
          tool: dprint@0.55.1
      - run: just fmt

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          rustflags: ""
      - uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df # v2.70.3
        with:
          tool: just
      - run: just clippy

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          rustflags: ""
      - uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df # v2.70.3
        with:
          tool: just
      - name: Cache DNG fixtures
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: tests/fixtures/dng
          key: dng-fixtures-v1-06221d01-5fb69596
      - run: just test
      - run: just test-fixtures

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df # v2.70.3
        with:
          tool: cargo-deny
      - uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df # v2.70.3
        with:
          tool: just
      - run: just deny

  doc:
    name: Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          rustflags: ""
      - uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df # v2.70.3
        with:
          tool: just
      - run: just doc

  cross-compile:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Keep this list in sync with deny.toml's [graph] targets — a target added here without a
        # matching entry there ships with no licence/advisory audit for its dependency graph.
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          rustflags: ""
          target: ${{ matrix.target }}
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.13.0
      - uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df # v2.70.3
        with:
          tool: cargo-zigbuild@0.20.0
      # zig's bundled cross-linker has no macOS system frameworks, so it cannot link anything
      # that needs one — e.g. `rawler` (via `chrono` -> `iana-time-zone`) links CoreFoundation to
      # read the system timezone on macOS. Point it at a real SDK's headers/framework stubs from
      # phracker/MacOSX-SDKs, the community-standard redistribution for exactly this (a third-party
      # mirror, not an Apple-official one — see cargo-zigbuild's docs on the underlying zig issue
      # and the `SDKROOT` workaround). SDK vintage only bounds which *new* macOS APIs are available
      # at build time, not which macOS versions can run the result, so 11.3 (Big Sur) is more than
      # sufficient here (docs/DECISIONS.md).
      - name: Cache macOS SDK
        if: contains(matrix.target, 'apple-darwin')
        id: macos-sdk-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: sdk
          key: macos-sdk-11.3
      - name: Fetch macOS SDK for cross-linking
        if: contains(matrix.target, 'apple-darwin') && steps.macos-sdk-cache.outputs.cache-hit != 'true'
        env:
          # https://github.com/phracker/MacOSX-SDKs/releases/tag/11.3
          SDK_SHA256: cd4f08a75577145b8f05245a2975f7c81401d75e9535dcffbb879ee1deefcbf4
        run: |
          curl -fsSL -o sdk.tar.xz \
            https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX11.3.sdk.tar.xz
          echo "$SDK_SHA256  sdk.tar.xz" | sha256sum -c -
          mkdir -p sdk
          tar -xf sdk.tar.xz -C sdk
      - name: Point cargo-zigbuild at the macOS SDK
        if: contains(matrix.target, 'apple-darwin')
        run: |
          test -d sdk/MacOSX11.3.sdk
          echo "SDKROOT=$PWD/sdk/MacOSX11.3.sdk" >> "$GITHUB_ENV"
      - run: cargo zigbuild --release --target ${{ matrix.target }}

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, deny, doc, cross-compile]
    if: always()
    steps:
      # Derives the per-job results directly from the `needs` context instead
      # of re-listing job names by hand in a second place. A job added to
      # `needs:` above is automatically checked here — no second list to keep
      # in sync, so a job that's missing from a hand-written list can't make
      # this report success while it actually failed.
      - name: Check all jobs
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
        run: echo "$NEEDS_CONTEXT" | jq -e 'all(.[]; .result == "success")'
